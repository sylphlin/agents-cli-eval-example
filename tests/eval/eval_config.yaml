metrics_to_run:
  - couplet_constraint_compliance
  - couplet_artistic_quality

custom_metrics:
  - name: couplet_constraint_compliance
    prompt_template: |
      你是一位嚴謹的傳統文學與對聯體格評審，負責檢驗「對聯創作機器人」是否精準遵守出題者的規範條件。

      請仔細對照出題題目與機器人生成的上下聯，進行硬性規範檢查：
      1. **上下聯字數精準度**：生成的上聯與下聯漢字數是否完全等於題目要求的字數？（標點符號不計入漢字數）
      2. **對聯結構**：內容中是否明確包含「上聯」與「下聯」？
      3. **嵌字聯格律落點檢驗（核心考核）**：
         - **鶴頂格（冠頭格）**：指定的兩個字必須分別位於「上聯第1字」與「下聯第1字」。
         - **雁足格（藏尾格）**：指定的兩個字必須分別位於「上聯最後一字」與「下聯最後一字」。
         - **腹嵌格**：指定的字詞必須位於上下聯的正中央（如7字聯的第4字，或5字聯的第3字）。
         - **魁鬥格**：上聯第1字為第一個指定字，下聯末字為第二個指定字。
         - **連理格**：指定詞組必須相鄰連續出現在上聯或下聯中。
         - **碎錦格（散嵌）**：指定的詞組多個漢字必須全數出現在上下聯中。

      請給出 1 至 5 分的嚴格打分：
      1分（差勁）：完全未達字數要求，或完全遺漏嵌字。
      2分（不及格）：字數正確但嵌字落點完全錯誤（例如鶴頂格嵌到了中間或句尾）。
      3分（普通）：字數正確，嵌字出現但個別落點有輕微偏差。
      4分（良好）：精準符合字數，嵌字格律落點基本正確。
      5分（優異）：字數絲毫不差，且嵌字完全精準落在體格規範的指定落點，無可挑剔。

      出題題目：{prompt}
      機器人生成內容：{response}
      完整軌跡紀錄：{agent_data}

      嚴格要求：請務必僅以 JSON 格式回傳評分結果，切勿在前後輸出任何解釋文字或 Markdown 標記：
      {
        "score": <1至5的整數>,
        "explanation": "<繁體中文詳細說明各項格律規範檢查結果>"
      }

  - name: couplet_artistic_quality
    prompt_template: |
      你是一位精通平仄對仗與詩詞美學的傳統文學大師。請評估此對聯的文學品質、意境與工整度。

      評分標準（綜合考量「詞性對仗」、「平仄協調」與「語意層次」）：
      1分（差勁）：詞性完全不對仗、平仄嚴重失調，且語意模糊或語句不通順。
      2分（不及格）：詞性對仗或平仄協調有明顯瑕疵，語意雖勉強可通但過於俗套或表意模糊。
      3分（普通）：詞性對仗與平仄協調尚可，語意通順清晰。
      4分（良好）：詞性工整對仗、平仄基本協調，語意流暢且具備文雅情致。
      5分（優異）：詞性嚴謹工整對仗、平仄和諧協調，且文辭優美雅致、意境深遠。

      出題題目：{prompt}
      機器人生成內容：{response}

      嚴格要求：請務必僅以 JSON 格式回傳評分結果，切勿在前後輸出任何解釋文字或 Markdown 標記：
      {
        "score": <1至5的整數>,
        "explanation": "<繁體中文詳細說明文學意境與對仗優缺點>"
      }
